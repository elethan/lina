services:
  lina:
    image: ghcr.io/genesiscare-eu/engineering:latest
    container_name: lina-container
    restart: always
    volumes:
      - lina_data:/app/shared-lina-db-vol
    env_file:
      - ./lina.env

  caddy:
    image: caddy:latest
    container_name: caddy-container
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      # - ./corp-certs:/etc/caddy/certs   # Uncomment if using Corporate Certificates (Option B below)
      - caddy_data:/data
      - caddy_config:/config

volumes:
  lina_data:
    name: lina_data
    external: true     
  caddy_data:
  caddy_config: